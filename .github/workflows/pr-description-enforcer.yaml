name: 'Pull request description'
on:
  pull_request:
    types: 
      - opened
      - edited
      - reopened

jobs:
  enforce:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: rudderlabs/pr-description-enforcer@1354172a4395fcfaa645b59cf8ef3cefa19e4f6d # v1.0.0
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          placeholder-regex: '< Replace .* >'
